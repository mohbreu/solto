name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  install-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run bootstrap
        run: sudo bash scripts/bootstrap.sh

      - name: Verify bootstrap result
        shell: bash
        run: |
          set -euo pipefail
          id agent
          sudo test -d /home/agent
          sudo -i -u agent env \
            HOME=/home/agent \
            XDG_CONFIG_HOME=/home/agent/.config \
            XDG_CACHE_HOME=/home/agent/.cache \
            XDG_DATA_HOME=/home/agent/.local/share \
            XDG_STATE_HOME=/home/agent/.local/state \
            bash -lc '
            set -euo pipefail
            source ~/.bashrc
            command -v node
            command -v npm
            command -v pnpm
            command -v pm2
            command -v codex
            command -v claude
            command -v cloudflared
            command -v bwrap
          '
